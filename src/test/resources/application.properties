# ===================================================================
# Test-Specific Application Properties
# This file completely overrides the main application.properties during tests.
# ===================================================================

# Use the H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Use create-drop to have Hibernate automatically create the schema for tests
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Liquibase for tests, as Hibernate is managing the schema
spring.liquibase.enabled=false

# Provide dummy secrets for the test environment so the context can load
jwt.secret=dGVzdC1zdXBlci1zZWNyZXQtYW5kLWxvbmctand0LWtleS10aGF0LWlzLWJhc2U2NC1lbmNvZGVk
jwt.expiration-ms=86400000
jwt.refresh-token.expiration-ms=604800000

# Provide dummy email properties
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=testpassword

# Provide dummy OAuth2 client properties
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Custom app properties
app.base-url=http://localhost:8080
