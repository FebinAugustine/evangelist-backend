# ===================================================================
# Core Application Settings
# ===================================================================
spring.application.name=evangelist
server.port=8080

# ===================================================================
# Database (PostgreSQL)
# ===================================================================
# Values are loaded from the .env file
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / Hibernate
# ===================================================================
# Use 'validate' to ensure the schema matches Liquibase migrations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# Liquibase Database Migrations
# ===================================================================
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

# ===================================================================
# Email (SMTP)
# ===================================================================
# Values are loaded from the .env file
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================================
# Custom Application Properties
# ===================================================================
# Base URL for constructing verification links, etc.
app.base-url=http://localhost:8080

# ===================================================================
# JWT & Security
# ===================================================================
# Value is loaded from the .env file
jwt.secret=${JWT_SECRET}

# JWT expiration in milliseconds (24 hours)
jwt.expiration-ms=86400000
# Refresh token expiration in milliseconds (7 days)
jwt.refresh-token.expiration-ms=604800000

# ===================================================================
# OAuth2 Client Properties (Google)
# ===================================================================
# Values are loaded from the .env file
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
