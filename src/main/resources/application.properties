# ===================================================================
# Core Application Settings
# ===================================================================
spring.application.name=evangelist
server.port=8080

# ===================================================================
# Database (PostgreSQL)
# ===================================================================
# Replace with your actual database URL, username, and password
spring.datasource.url=jdbc:postgresql://localhost:5432/authdb
spring.datasource.username=your-db-username
spring.datasource.password=your-db-password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / Hibernate
# ===================================================================
# Use 'validate' to ensure the schema matches Flyway migrations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# Flyway Database Migrations
# ===================================================================
spring.flyway.baseline-on-migrate=true

# ===================================================================
# Email (SMTP)
# ===================================================================
# Replace with your SMTP server details (e.g., Gmail with an App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=febinaugustine7@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================================
# Custom Application Properties
# ===================================================================
# Base URL for constructing verification links, etc.
app.base-url=http://localhost:8080

# ===================================================================
# JWT & Security
# ===================================================================
# Use a strong, base64-encoded secret in production. Generate one from https://www.allkeysgenerator.com/
jwt.secret=your-super-secret-and-long-jwt-key-that-is-base64-encoded
jwt.expiration-ms=86400000 # 24 hours
jwt.refresh-token.expiration-ms=604800000 # 7 days
